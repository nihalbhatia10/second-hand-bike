<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | 2wheelerexchange</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 12px;">
                <img src="images/logo.png" alt="2wheelerexchange Logo" height="60">
                <span>2wheeler<span class="logo-red">exchange</span></span>
            </a>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#featured">Featured</a></li>
                <li><a href="inventory.html" class="active">Inventory</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

            <button class="menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header section">
        <div class="container">

            <h1>Our <span class="text-gradient logo-red">Inventory</span></h1>
            <p>Browse our complete collection of meticulously inspected 2-wheelers.</p>
        </div>
    </header>

    <!-- Inventory Filter & Grid -->
    <main class="section" style="padding-top: 0;">
        <div class="container">
            <!-- Filtering UI -->
            <div class="filter-container">
                <button class="filter-btn active" data-filter="all">All Models</button>
                <button class="filter-btn" data-filter="classic">Classic</button>
                <button class="filter-btn" data-filter="scooter">Scooter</button>
                <button class="filter-btn" data-filter="street">Street</button>
            </div>

            <!-- Bike Grid -->
            <div class="bike-grid" id="inventory-grid">

                <!-- Item 1 (FZ Yamaha) -->
                <div class="bike-card fade-in" data-category="street">
                    <div class="card-image-wrapper">
                        <img src="images/FZ.jpg" alt="FZ Yamaha" loading="lazy">
                    </div>
                    <div class="card-content">
                        <h3 class="bike-name">FZ Yamaha</h3>
                        <p class="bike-specs">150cc • Street</p>

                    </div>
                </div>

                <!-- Item 2 (Vespa) -->
                <div class="bike-card fade-in" data-category="scooter">
                    <div class="card-image-wrapper">
                        <span class="card-badge">Classic</span>
                        <img src="images/vespa.jpg" alt="Vespa" loading="lazy">
                    </div>
                    <div class="card-content">
                        <h3 class="bike-name">Vespa</h3>
                        <p class="bike-specs">150cc • Scooter</p>

                    </div>
                </div>



                <!-- Item 4 (Activa original) -->
                <div class="bike-card fade-in" data-category="scooter">
                    <div class="card-image-wrapper">
                        <img src="images/Activa.jpg" alt="Activa" loading="lazy">
                    </div>
                    <div class="card-content">
                        <h3 class="bike-name">Activa</h3>
                        <p class="bike-specs">110cc • Scooter</p>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
